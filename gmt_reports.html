/* Period tabs */

.ptab {
  padding:12px 16px;

  border-bottom:2.5px solid transparent;
  white-space:nowrap; transition:all 0.15s;

  background:none; border-top:none; border-left:none; border-right:none;
}
.ptab.active { color:var(--red); border-bottom-color:var(--red); }

/* Cards */
.section { padding:14px 14px 0; }
.section-title { font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px; }

.summary-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; margin-bottom:14px;
}

.sum-card {
  background:var(--surface);

/* Toast */
#toast-wrap { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:8000;width:min(340px,90vw);display:flex;flex-direction:column;gap:7px;pointer-events:none; }

@keyframes tIn { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }

/* Empty */
.empty-hint { text-align:center;padding:32px 20px;color:var(--text3);font-size:13px;font-weight:600; }

/* Refresh */

</style>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let period    = 'today';
let reportData = null;

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('h-company').textContent = CONFIG.COMPANY_NAME;
  loadReport();
});

// ══════════════════════════════════════════════
// PERIOD
// ══════════════════════════════════════════════
function setPeriod(el) {
  period = el.dataset.p;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadReport();
}

function getDateRange() {
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if (period === 'today') {
    return { from: today.toISOString(), to: new Date(today.getTime() + 86400000).toISOString() };
  }
  if (period === 'week') {
    const day  = today.getDay();
    const diff = today.getDate() - day + (day === 0 ? -6 : 1);
    const mon  = new Date(today.setDate(diff));
    return { from: mon.toISOString(), to: new Date().toISOString() };
  }
  if (period === 'month') {
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: first.toISOString(), to: new Date().toISOString() };
  }
  return { from: null, to: null };
}

// ══════════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════════
async function loadReport() {
  showLoad('جارٍ تحميل التقارير...');
  try {
    const { from, to } = getDateRange();

    // جلب الفواتير
    let invUrl = `${CONFIG.SUPABASE_URL}/rest/v1/invoices?select=id,inv_number,branch_key,branch_name,total,items_count,created_at&order=created_at.desc`;
    if (from) invUrl += `&created_at=gte.${from}`;
    if (to)   invUrl += `&created_at=lt.${to}`;

    const invRes = await sbGet(invUrl);
    const invoices = invRes || [];

    // جلب البنود بدون cost_price أولاً (لتجنب HTTP 400 إذا العمود غير موجود)
    let items = [];
    if (invoices.length) {
      const invIds = invoices.map(i => i.id).join(',');
      // نجرب مع cost_price أولاً، وإذا فشل نجرب بدونه
      try {
        const itemsUrl = `${CONFIG.SUPABASE_URL}/rest/v1/invoice_items?select=invoice_id,product_id,product_name,branch_key,qty,unit_price,cost_price,total&invoice_id=in.(${invIds})`;
        items = await sbGet(itemsUrl) || [];
      } catch(e) {
        // cost_price غير موجود — نجلب بدونه
        const itemsUrl = `${CONFIG.SUPABASE_URL}/rest/v1/invoice_items?select=invoice_id,product_id,product_name,branch_key,qty,unit_price,total&invoice_id=in.(${invIds})`;
        items = await sbGet(itemsUrl) || [];
      }
    }

    // Fallback: للبنود التي لا تحتوي cost_price (مبيعات قديمة قبل الإصلاح)
    // نجلب cost_price الحالي من جدول products فقط للمنتجات الناقصة
    let costMap = {};
    try {
      const missingCostIds = [...new Set(
        items
          .filter(i => i.product_id && !(Number(i.cost_price) > 0))
          .map(i => i.product_id)
      )];
      if (missingCostIds.length) {
        const costRes = await sbGet(
          `${CONFIG.SUPABASE_URL}/rest/v1/products?id=in.(${missingCostIds.join(',')})&select=id,cost_price`
        );
        if (Array.isArray(costRes)) costRes.forEach(p => { costMap[p.id] = Number(p.cost_price) || 0; });
      }
    } catch(e) { /* cost_price column may not exist yet */ }

    reportData = { invoices, items, costMap };
    renderReport(invoices, items, costMap);

  } catch(e) {
    showToast('خطأ في التحميل: ' + e.message, 'err');
  } finally {
    hideLoad();
  }
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderReport(invoices, items, costMap = {}) {
  // ── Summary ──
  const totalSales = invoices.reduce((s, i) => s + Number(i.total), 0);
  const totalItems = invoices.reduce((s, i) => s + Number(i.items_count), 0);
  const avgInv     = invoices.length ? Math.round(totalSales / invoices.length) : 0;

  // حساب الأرباح — أولوية لـ cost_price المحفوظ في البند وقت البيع (دقة تاريخية)
  // إذا غاب (مبيعات قديمة) → fallback لـ costMap (سعر التكلفة الحالي)
  let totalCost    = 0;
  let hasCostData  = false;
  for (const item of items) {
    // cost_price المحفوظ في invoice_items وقت البيع — الأدق تاريخياً
    const historicCost = Number(item.cost_price);
    const fallbackCost = costMap[item.product_id] || 0;
    const cp = historicCost > 0 ? historicCost : fallbackCost;
    if (cp > 0) { totalCost += cp * item.qty; hasCostData = true; }
  }
  const totalProfit = hasCostData ? totalSales - totalCost : null;
  const margin      = hasCostData && totalSales > 0 ? Math.round((totalProfit / totalSales) * 100) : null;

  document.getElementById('s-total').textContent    = '$ ' + totalSales.toLocaleString('en-US');
  document.getElementById('s-invoices').textContent = invoices.length;
  document.getElementById('s-items').textContent    = totalItems;
  document.getElementById('s-avg').textContent      = '$ ' + avgInv.toLocaleString('en-US');
  document.getElementById('s-profit').textContent   = hasCostData ? '$ ' + totalProfit.toLocaleString('en-US') : '—';
  document.getElementById('s-margin').textContent   = hasCostData ? margin + '%' : '—';

  // ── By Branch ──
  const byBranch = {};
  for (const inv of invoices) {
    if (!byBranch[inv.branch_key]) {
      byBranch[inv.branch_key] = { name: inv.branch_name, total: 0, count: 0, items: {} };
    }
    byBranch[inv.branch_key].total += Number(inv.total);
    byBranch[inv.branch_key].count++;
  }
  // بنود لكل فرع
  for (const item of items) {
    const b = byBranch[item.branch_key];
    if (!b) continue;
    if (!b.items[item.product_name]) b.items[item.product_name] = { qty:0, total:0 };
    b.items[item.product_name].qty   += item.qty;
    b.items[item.product_name].total += Number(item.total);
  }

  const maxTotal = Math.max(...Object.values(byBranch).map(b => b.total), 1);
  const sorted   = Object.entries(byBranch).sort((a,b) => b[1].total - a[1].total);

  const brEl = document.getElementById('branches-list');
  if (!sorted.length) {
    brEl.innerHTML = '<div class="empty-hint">لا توجد مبيعات في هذه الفترة</div>';
  } else {
    brEl.innerHTML = sorted.map(([key, b], i) => {
      const pct    = Math.round((b.total / maxTotal) * 100);
      const itemRows = Object.entries(b.items)
        .sort((a,z) => z[1].qty - a[1].qty)
        .map(([name, d]) => `
          <div class="br-item-row">
            <div class="bi-name">${escH(name)}</div>
            <div class="bi-qty">${d.qty} وحدة</div>
            <div class="bi-total">${d.total > 0 ? '$ ' + d.total.toLocaleString('en-US') : '—'}</div>
          </div>`).join('');

      return `<div class="branch-row">
        <div class="br-top">
          <div class="br-name">🏪 ${escH(b.name)}</div>
          <div class="br-inv">${b.count} فاتورة</div>
          <div class="br-total">${'$ ' + b.total.toLocaleString('en-US')}</div>
        </div>
        <div class="br-bar-wrap"><div class="br-bar" style="width:${pct}%"></div></div>
        ${itemRows ? `
          <div style="margin-top:8px;">
            <button onclick="toggleItems(this)" style="font-size:11px;font-weight:700;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Cairo',sans-serif;padding:0;">
              ▼ تفاصيل المنتجات
            </button>
            <div class="br-items">${itemRows}</div>
          </div>` : ''}
      </div>`;
    }).join('');
  }

  // ── Top Products ──
  const byProduct = {};
  for (const item of items) {
    if (!byProduct[item.product_name])
      byProduct[item.product_name] = { qty:0, total:0 };
    byProduct[item.product_name].qty   += item.qty;
    byProduct[item.product_name].total += Number(item.total);
  }

  const topProds = Object.entries(byProduct)
    .sort((a,b) => b[1].qty - a[1].qty)
    .slice(0, 8);

  const tpEl = document.getElementById('top-products');
  if (!topProds.length) {
    tpEl.innerHTML = '<div class="empty-hint">لا توجد بيانات</div>';
  } else {
    tpEl.innerHTML = topProds.map(([name, d], i) => {
      const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      return `<div class="top-product">
        <div class="tp-rank ${rankCls}">${i+1}</div>
        <div class="tp-info">
          <div class="tp-name">${escH(name)}</div>
          <div class="tp-qty">${d.qty} وحدة مباعة</div>
        </div>
        <div class="tp-total">${d.total > 0 ? '$ ' + d.total.toLocaleString('en-US')  : '—'}</div>
      </div>`;
    }).join('');
  }

  // ── Invoices List ──
  renderInvoicesList(invoices, 10);
}

let _invShowAll = false;
function renderInvoicesList(invoices, limit) {
  const el = document.getElementById('invoices-list');
  if (!el) return;
  if (!invoices.length) {
    el.innerHTML = '<div class="empty-hint">لا توجد فواتير في هذه الفترة</div>';
    return;
  }
  const sorted = [...invoices].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const show   = _invShowAll ? sorted : sorted.slice(0, limit);

  el.innerHTML = show.map(inv => {
    const d   = new Date(inv.created_at);
    const dt  = d.toLocaleDateString('ar', { day:'2-digit', month:'2-digit', year:'numeric' });
    const tm  = d.toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
    const num = inv.inv_number ? `#${inv.inv_number}` : `#${String(inv.id).slice(-4)}`;
    return `<div class="inv-row">
      <div class="inv-num">${num}</div>
      <div class="inv-info">
        <div class="inv-branch">🏪 ${escH(inv.branch_name || inv.branch_key)}</div>
        <div class="inv-date">${dt} — ${tm}</div>
      </div>
      <div class="inv-items-badge">${inv.items_count} قطعة</div>
      <div class="inv-total">$ ${Number(inv.total).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
    </div>`;
  }).join('');

  if (sorted.length > limit) {
    const remaining = sorted.length - limit;
    el.innerHTML += `<div class="inv-list-more" onclick="
      _invShowAll = !_invShowAll;
      renderInvoicesList(reportData.invoices, ${limit});
    ">${_invShowAll ? '▲ إخفاء' : `▼ عرض ${remaining} فاتورة أخرى`}</div>`;
  }
}

function toggleItems(btn) {
  const panel = btn.nextElementSibling;
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? '▲ إخفاء التفاصيل' : '▼ تفاصيل المنتجات';
}

// ══════════════════════════════════════════════
// TELEGRAM
// ══════════════════════════════════════════════
async function sendToTelegram() {
  if (!reportData) return;
  // التحقق من إعداد Telegram
  if (!CONFIG.TG_BOT_TOKEN || CONFIG.TG_BOT_TOKEN.includes('123456') || CONFIG.TG_BOT_TOKEN.includes('ABC')) {
    showToast('⚙️ يرجى إعداد TG_BOT_TOKEN في CONFIG أولاً', 'err');
    return;
  }
  if (!CONFIG.TG_CHAT_ID || CONFIG.TG_CHAT_ID.includes('xxx')) {
    showToast('⚙️ يرجى إعداد TG_CHAT_ID في CONFIG أولاً', 'err');
    return;
  }
  const btn = document.getElementById('tg-btn');
  btn.disabled = true;

  const { invoices, items, costMap = {} } = reportData;
  const totalSales = invoices.reduce((s,i) => s + Number(i.total), 0);
  const totalItems = invoices.reduce((s,i) => s + Number(i.items_count), 0);

  // حساب الأرباح للتقرير
  let totalCost = 0; let hasCostData = false;
  for (const item of items) {
    const cp = costMap[item.product_id];
    if (cp > 0) { totalCost += cp * item.qty; hasCostData = true; }
  }
  const profitLine = hasCostData
    ? `\n💹 *صافي الربح:* $ ${(totalSales - totalCost).toLocaleString('en-US')} (${Math.round(((totalSales-totalCost)/totalSales)*100)}%)`
    : '';

  const periodLabel = {
    today: 'اليوم', week: 'الأسبوع', month: 'الشهر الحالي', all: 'الكل'
  }[period];

  const now = new Date();
  const dateStr = now.toLocaleDateString('ar-SY', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  const timeStr = now.toLocaleTimeString('ar-SY', { hour:'2-digit', minute:'2-digit' });

  // ── ملخص الفروع ──
  const byBranch = {};
  for (const inv of invoices) {
    if (!byBranch[inv.branch_key])
      byBranch[inv.branch_key] = { name: inv.branch_name, total:0, count:0 };
    byBranch[inv.branch_key].total += Number(inv.total);
    byBranch[inv.branch_key].count++;
  }

  const branchLines = Object.values(byBranch)
    .sort((a,b) => b.total - a.total)
    .map(b => `  🏪 ${b.name}: ${'$ ' + b.total.toLocaleString('en-US')} (${b.count} فاتورة)`)
    .join('\n') || '  لا توجد مبيعات';

  // ── أكثر ٣ منتجات ──
  const byProduct = {};
  for (const item of items) {
    if (!byProduct[item.product_name]) byProduct[item.product_name] = { qty:0 };
    byProduct[item.product_name].qty += item.qty;
  }
  const top3 = Object.entries(byProduct)
    .sort((a,b) => b[1].qty - a[1].qty)
    .slice(0,3)
    .map(([name,d],i) => `  ${['🥇','🥈','🥉'][i]} ${name}: ${d.qty} وحدة`)
    .join('\n') || '  —';

  const msg = `📊 *تقرير مبيعات ${CONFIG.COMPANY_NAME}*
━━━━━━━━━━━━━━━━━━━━
📅 الفترة: *${periodLabel}*
🕐 ${dateStr} — ${timeStr}

💰 *إجمالي المبيعات:* ${'$ ' + totalSales.toLocaleString('en-US')}
🧾 *عدد الفواتير:* ${invoices.length}
📦 *الوحدات المباعة:* ${totalItems}
📈 *متوسط الفاتورة:* ${invoices.length ? Math.round(totalSales/invoices.length).toLocaleString('en-US') : 0}${profitLine}

🏪 *مبيعات الفروع:*
${branchLines}

🔥 *أكثر المنتجات مبيعاً:*
${top3}

—
_GMT Systems_`;

  try {
    const r = await fetch(
      `https://api.telegram.org/bot${CONFIG.TG_BOT_TOKEN}/sendMessage`,
      {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({
          chat_id    : CONFIG.TG_CHAT_ID,
          text       : msg,
          parse_mode : 'Markdown',
        }),
      }
    );
    const res = await r.json();
    if (!res.ok) throw new Error(res.description || 'فشل الإرسال');

    showToast('✓ تم إرسال التقرير لـ Telegram', 'ok');
    const sent = document.getElementById('tg-sent');
    sent.textContent = `✓ آخر إرسال: ${timeStr}`;
    sent.style.display = 'block';
  } catch(e) {
    showToast('خطأ Telegram: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
async function sbGet(url) {
  const r = await fetch(url, {
    headers: { apikey: CONFIG.SUPABASE_KEY, Authorization: 'Bearer ' + CONFIG.SUPABASE_KEY }
  });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const d = await r.json(); msg = d?.message || d?.hint || msg; } catch(e) {}
    throw new Error(msg);
  }
  return r.json();
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showLoad(msg) {
  document.getElementById('load-text').textContent = msg;
  document.getElementById('loading-overlay').style.display = 'flex';
}

function hideLoad() {
  document.getElementById('loading-overlay').style.display = 'none';
}

function showToast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.3s,transform 0.3s';
    t.style.opacity='0'; t.style.transform='translateY(8px)';
    setTimeout(()=>t.remove(),300);
  }, 2800);
}
